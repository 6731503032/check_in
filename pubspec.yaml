name: class_checkin_app
description: Smart Class Check-in & Learning Reflection App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0

  # GPS
  geolocator: ^10.1.0

  # QR Scanner
  mobile_scanner: ^3.5.5

  # Camera (live selfie viewfinder — works on mobile & web)
  camera: ^0.10.5+9

  # Permissions — mobile only
  permission_handler: ^11.3.0

  # Local Storage — mobile only (skipped on web)
  sqflite: ^2.3.0
  path: ^1.8.3

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true